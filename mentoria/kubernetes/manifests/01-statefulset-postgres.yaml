apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-server
spec:
  serviceName: db-server
  replicas: 1

  selector:
    matchLabels:
      app: db-server

  template:
    metadata:
      labels:
        app: db-server

    spec:
      containers:
        - name: db-server
          image: postgres:16
          imagePullPolicy: IfNotPresent

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-projeto
                  key: postgres_projeto

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-projeto
                  key: postgres_projeto

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: postgres_password

          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pvc-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: db-server
spec:
  type: ClusterIP

  selector:
    app: db-server

  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
