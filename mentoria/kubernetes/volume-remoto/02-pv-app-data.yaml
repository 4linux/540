apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-app-data
spec:
  capacity:
    storage: 10Gi

  volumeMode: Filesystem

  accessModes:
    - ReadWriteMany

  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static

  mountOptions:
    - hard
    - proto=tcp
    - nfsvers=4

  nfs:
    server: 192.168.56.103
    path: /appdata
    readOnly: false
