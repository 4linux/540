apiVersion: v1
kind: PersistentVolume
metadata:
  name: jvm-app-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/k8s/jvm-app
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - docker-manager

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jvm-app-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jvm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jvm-app
  template:
    metadata:
      labels:
        app: jvm-app
    spec:
      containers:
        - name: jvm-app
          image: tomcat:9-jdk17
          ports:
            - containerPort: 8080
          tty: true
          volumeMounts:
            - name: jvm-app-volume
              mountPath: /usr/local/tomcat/webapps/ROOT.war
              subPath: ROOT.war
      volumes:
        - name: jvm-app-volume
          persistentVolumeClaim:
            claimName: jvm-app-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: jvm-app-service
spec:
  type: NodePort
  selector:
    app: jvm-app
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 32768
